<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batman</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            text-align: center;
        }
        
        .logo {
            width: 200px;
            height: 200px;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/Batman_symbol.svg/1200px-Batman_symbol.svg.png');
            background-size: contain;
            background-repeat: no-repeat;
            margin: 0 auto;
        }
        
        h1 {
            color: #f7dc6f;
        }
        
        .descricao {
            padding: 20px;
            background-color: #333;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"></div>
        <h1>Batman: O Cavaleiro das Trevas</h1>
        <div class="descricao">
            <p>Batman é um super-herói da DC Comics, criado por Bob Kane e Bill Finger.</p>
            <p>Ele é o alter ego de Bruce Wayne, um bilionário filantropo que jura vengar o assassinato de seus pais.</p>
        </div>
    </div>
</body>
</html>
